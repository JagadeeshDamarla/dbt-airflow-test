name: Deploy dbt to Composer

on:
  push:
    branches:
      - main
    paths:
      - 'dbt_airflow_test/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # CRITICAL: These permissions are required for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Replace YOUR_PROJECT_NUMBER and YOUR_PROJECT_ID below!
          workload_identity_provider: 'projects/845747503849/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-composer-deploy@test-and-try-499509.iam.gserviceaccount.com'

      - name: Sync dbt project to Composer GCS bucket
        run: |
          gcloud storage rsync ./dbt_airflow_test gs://dbt_test_bucket184567/data/dbt_airflow_test --recursive --delete-unmatched-destination-objects
          