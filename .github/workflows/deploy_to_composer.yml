name: Deploy dbt to Composer

on:
  push:
    branches:
      - main
    paths:
      - 'dbt_airflow_test/**' # Only trigger if dbt files change

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          # If using Workload Identity Federation (best practice), replace the line above with:
          # workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
          # service_account: 'my-service-account@my-project.iam.gserviceaccount.com'

      - name: Sync dbt project to Composer GCS bucket
        # Using gsutil to perform an rsync, which only updates changed files and deletes removed ones
        run: |
          gsutil rsync -r -d ./dbt_airflow_test gs://your-composer-bucket-name/data/dbt_airflow_test